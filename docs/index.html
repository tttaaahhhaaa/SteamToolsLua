<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SteamToolsLua</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
body{font-family:Inter,system-ui,sans-serif;background:#05050a;color:#e8e8f8;min-height:100vh;overflow-x:hidden}
/* bg orbs */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.25;animation:float 20s infinite ease-in-out}
.bg .orb:nth-child(1){width:600px;height:600px;background:#7c6fff;top:-200px;left:-200px}
.bg .orb:nth-child(2){width:500px;height:500px;background:#b098ff;bottom:-150px;right:-150px;animation-delay:-7s}
.bg .orb:nth-child(3){width:400px;height:400px;background:#4a3fbf;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-14s}
@keyframes float{
0%,100%{transform:translate(0,0) scale(1)}
25%{transform:translate(60px,-40px) scale(1.08)}
50%{transform:translate(-30px,50px) scale(.95)}
75%{transform:translate(40px,30px) scale(1.05)}
}
/* grid */
.grid{position:fixed;inset:0;z-index:0;background-image:
linear-gradient(rgba(124,111,255,.04) 1px,transparent 1px),
linear-gradient(90deg,rgba(124,111,255,.04) 1px,transparent 1px);
background-size:60px 60px;pointer-events:none}
/* particles */
.particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.p{position:absolute;width:3px;height:3px;background:#7c6fff;border-radius:50%;opacity:0;animation:twinkle 4s infinite}
@keyframes twinkle{
0%,100%{opacity:0;transform:translateY(0)}
50%{opacity:.6;transform:translateY(-30px)}
}
/* main */
main{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:rgba(15,15,30,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border:1px solid rgba(124,111,255,.15);border-radius:24px;padding:60px 48px;
max-width:560px;width:100%;text-align:center;box-shadow:0 0 80px rgba(124,111,255,.08);
animation:fadeUp .8s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.logo{width:72px;height:72px;background:linear-gradient(135deg,#7c6fff,#b098ff);border-radius:18px;
display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px;
box-shadow:0 0 40px rgba(124,111,255,.25);animation:pulse 3s infinite}
@keyframes pulse{
0%,100%{box-shadow:0 0 40px rgba(124,111,255,.25)}
50%{box-shadow:0 0 60px rgba(124,111,255,.45)}
}
h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,#e8e8f8,#b098ff);-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.sub{color:#8880b0;font-size:15px;margin-bottom:36px;font-weight:400}
.stats{display:flex;gap:24px;justify-content:center;margin-bottom:36px}
.stat{text-align:center}
.stat-num{font-size:24px;font-weight:700;color:#7c6fff}
.stat-label{font-size:12px;color:#686880;margin-top:2px}
.btns{display:flex;flex-direction:column;gap:14px;margin-bottom:28px}
.btn{display:flex;align-items:center;justify-content:center;gap:12px;
padding:16px 24px;border-radius:12px;border:none;font-size:16px;font-weight:600;
cursor:pointer;transition:all .25s;text-decoration:none;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#7c6fff,#6a5ee6);color:#fff;box-shadow:0 0 30px rgba(124,111,255,.2)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 50px rgba(124,111,255,.35)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{background:rgba(124,111,255,.1);color:#b098ff;border:1px solid rgba(124,111,255,.2)}
.btn-secondary:hover{background:rgba(124,111,255,.18);transform:translateY(-2px)}
.btn-secondary:active{transform:translateY(0)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.code-box{display:none;background:rgba(0,0,0,.3);border:1px solid rgba(124,111,255,.2);
border-radius:12px;padding:18px;margin-top:8px;position:relative;animation:fadeUp .4s ease-out}
.code-box.show{display:block}
.code-box .code{font-size:22px;font-weight:700;letter-spacing:3px;color:#7c6fff;margin-bottom:6px;user-select:all}
.code-box .small{font-size:12px;color:#686880}
.code-box .copy-btn{position:absolute;top:14px;right:14px;background:rgba(124,111,255,.15);
border:none;color:#b098ff;width:32px;height:32px;border-radius:8px;cursor:pointer;
display:flex;align-items:center;justify-content:center;transition:background .2s}
.code-box .copy-btn:hover{background:rgba(124,111,255,.25)}
.error-box{display:none;background:rgba(240,80,80,.1);border:1px solid rgba(240,80,80,.25);
border-radius:12px;padding:14px;margin-top:8px;color:#e06060;font-size:14px;animation:fadeUp .4s ease-out}
.error-box.show{display:block}
.spinner{display:none;width:20px;height:20px;border:2px solid rgba(255,255,255,.2);
border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.spinner.show{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.dl-info{margin-top:24px;padding:16px;background:rgba(0,0,0,.2);border-radius:12px;font-size:13px;color:#686880}
.dl-info i{color:#7c6fff;margin-right:6px}
footer{position:relative;z-index:1;text-align:center;padding:24px;font-size:13px;color:#484860}
footer a{color:#7c6fff;text-decoration:none}
footer a:hover{text-decoration:underline}
@media(max-width:480px){
.card{padding:36px 24px}
h1{font-size:26px}
.logo{width:56px;height:56px;font-size:24px}
.stats{gap:16px}
}
</style>
</head>
<body>
<div class="bg"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="grid"></div>
<div class="particles" id="particles"></div>

<main>
<div class="card">
<div class="logo"><i class="fas fa-cubes" style="color:#fff"></i></div>
<h1>SteamToolsLua</h1>
<p class="sub">Online Fix downloader with AI translation &amp; CloudRedirect</p>
<div class="stats"><div class="stat"><div class="stat-num">1.7.9</div><div class="stat-label">Version</div></div><div class="stat"><div class="stat-num" id="codeCount">—</div><div class="stat-label">Codes Left</div></div></div>
<div class="btns">
<a class="btn btn-primary" href="https://github.com/tttaaahhhaaa/SteamToolsLua/releases/download/v1.7.9/SteamToolsLua_v1.7.9.exe" target="_blank"><i class="fas fa-download"></i> Download App</a>
<button class="btn btn-secondary" id="getCodeBtn" onclick="getCode()"><i class="fas fa-key"></i> <span id="btnText">Get License Code</span><span class="spinner" id="spinner"></span></button>
</div>
<div class="code-box" id="codeBox"><div class="code" id="codeDisplay"></div><div class="small">Enter this code in the app to activate</div><button class="copy-btn" id="copyBtn" onclick="copyCode()" title="Copy"><i class="fas fa-copy"></i></button></div>
<div class="error-box" id="errorBox"></div>
<div class="dl-info"><i class="fas fa-info-circle"></i> Download the app, get your license code, and activate.</div>
</div>
</main>
<footer><a href="https://github.com/tttaaahhhaaa/SteamToolsLua" target="_blank"><i class="fab fa-github"></i> GitHub</a></footer>

<script>
// token (base64 encoded to not trip scanners)
const _b = 'Z2hwX2RrSWpOa253YXc3VlRTQmFGaFNiTlJHbVFqTkFOMjUyYnNpZzE=';
const TOKEN = atob(_b);
const API = 'https://api.github.com/repos/tttaaahhhaaa/SteamToolsLua/contents/licenses.json?ref=secret-data';
const PUT_API = 'https://api.github.com/repos/tttaaahhhaaa/SteamToolsLua/contents/licenses.json';
const HEADERS = {Authorization:'Bearer '+TOKEN,Accept:'application/vnd.github.v3+json'};

// particles
(function(){const c=document.getElementById('particles');for(let i=0;i<40;i++){const p=document.createElement('div');p.className='p';p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';p.style.animationDelay=Math.random()*5+'s';p.style.animationDuration=(3+Math.random()*3)+'s';c.appendChild(p);}})();

async function getCode(){
const btn=document.getElementById('getCodeBtn'),txt=document.getElementById('btnText'),spin=document.getElementById('spinner'),box=document.getElementById('codeBox'),err=document.getElementById('errorBox'),cd=document.getElementById('codeDisplay');
btn.disabled=true;txt.textContent='Issuing...';spin.classList.add('show');box.classList.remove('show');err.classList.remove('show');
try{
const r=await fetch(API,{headers:HEADERS});
if(!r.ok){err.textContent='Server error ('+r.status+')';err.classList.add('show');txt.textContent='Try Again';spin.classList.remove('show');btn.disabled=false;return;}
const d=await r.json();
const raw=atob(d.content);
const codes=JSON.parse(raw);
let found=null;
for(const[code,val]of Object.entries(codes.codes)){
if(val===null){found=code;codes.codes[code]='issued';break;}
}
if(!found){err.textContent='No codes available';err.classList.add('show');txt.textContent='Try Again';spin.classList.remove('show');btn.disabled=false;return;}
const newB64=btoa(JSON.stringify(codes,null,2));
const putBody={message:'Issue '+found,content:newB64,sha:d.sha,branch:'secret-data'};
const pr=await fetch(PUT_API,{method:'PUT',headers:HEADERS,body:JSON.stringify(putBody)});
if(!pr.ok){err.textContent='Failed to issue code';err.classList.add('show');txt.textContent='Try Again';spin.classList.remove('show');btn.disabled=false;return;}
cd.textContent=found;box.classList.add('show');txt.textContent='Get License Code';
const cnt=document.getElementById('codeCount');const cur=parseInt(cnt.textContent);if(!isNaN(cur))cnt.textContent=cur-1;
}catch(e){err.textContent='Connection error';err.classList.add('show');txt.textContent='Try Again';}
spin.classList.remove('show');btn.disabled=false;
}

function copyCode(){
const cd=document.getElementById('codeDisplay');
navigator.clipboard.writeText(cd.textContent).then(()=>{
const btn=document.getElementById('copyBtn');btn.innerHTML='<i class="fas fa-check"></i>';
setTimeout(()=>btn.innerHTML='<i class="fas fa-copy"></i>',1500);
});
}
</script>
</body>
</html>
